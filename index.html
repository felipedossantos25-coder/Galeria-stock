<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Fotos Gratuitas</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        header p {
            color: #7f8c8d;
        }

        /* Grid da Galeria */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .gallery-item:hover {
            transform: scale(1.03);
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .caption {
            padding: 15px;
            font-size: 14px;
            color: #555;
            text-align: center;
        }

        .caption a {
            color: #3498db;
            text-decoration: none;
        }

        .caption a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <h1>Minha Galeria Sem Copyright</h1>
        <p>Imagens bonitas e gratuitas para uso livre.</p>
    </header>

    <div class="gallery">
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600" alt="Paisagem de montanha">
            <div class="caption">Foto por Unsplash</div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=600" alt="Natureza com neblina">
            <div class="caption">Foto por Unsplash</div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=600" alt="Ponte na floresta">
            <div class="caption">Foto por Unsplash</div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1472214222541-d510753a4707?w=600" alt="Vale verdejante">
            <div class="caption">Foto por Unsplash</div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=600" alt="Montanhas verdes">
            <div class="caption">Foto por Unsplash</div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=600" alt="Pessoa na natureza">
            <div class="caption">Foto por Unsplash</div>
        </div>
    </div>

</body>
</html>
