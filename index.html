<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Fotos Gratuitas</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        header p {
            color: #7f8c8d;
        }

        /* Grid da Galeria */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .gallery-item:hover {
            transform: scale(1.03);
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .caption {
            padding: 15px;
            font-size: 14px;
            color: #555;
            text-align: center;
        }

        .caption a {
            color: #3498db;
            text-decoration: none;
        }

        .caption a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <h1>Minha Galeria Sem Copyright</h1>
        <p>Imagens bonitas e gratuitas para uso livre.</p>
    </header>

    <div class="gallery">
        <div class="gallery-item">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTakYi6qkyBsJgke8UTZFiudSe_xEdYJo3V3g&s" alt="Familia Feliz">
            <div class="caption">Foto por Unsplash</div>
        </div>

        <div class="gallery-item">
            <img src="https://www.infoescola.com/wp-content/uploads/2008/03/neblina-137947862.jpg" alt="Natureza com neblina">
            <div class="caption">Foto por Unsplash</div>
        </div>

        <div class="gallery-item">
            <img src="https://rondonia.ro.gov.br/wp-content/uploads/2016/07/IMG-20160622-WA0053.jpg" alt="Ponte na floresta">
            <div class="caption">Foto por Unsplash</div>
        </div>

        <div class="gallery-item">
            <img src="https://minasgeraistur.com.br/wp-content/uploads/2019/12/passeio-vale-verde-alambique-parque-ecologico.jpg.webp" alt="Vale verdejante">
            <div class="caption">Foto por Unsplash</div>
        </div>

        <div class="gallery-item">
            <img src="https://thumbs.dreamstime.com/b/montanha-verde-5143686.jpg" alt="Montanhas verdes">
            <div class="caption">Foto por Unsplash</div>
        </div>

        <div class="gallery-item">
            <img src="https://thumbs.dreamstime.com/b/pessoa-feliz-na-natureza-com-bra%C3%A7os-aumentados-92364364.jpg" alt="Pessoa na natureza">
            <div class="caption">Foto por Unsplash</div>
        </div>
    </div>

</body>
</html>
